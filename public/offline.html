<!DOCTYPE html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050505" />
    <title>REVIVETECHLOUNGE Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, Helvetica, sans-serif;
        background: #050505;
        color: #ffffff;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;

      main {

        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        color: #d4d4d8;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
